# Note: After you install the AEM Code Sync bot, this file
# is used once to set the site's initial configuration in the config service.
# It is not used again. Make all subsequent site configuration changes
# through the Helix API.
# See: https://www.aem.live/docs/config-service-setup
mountpoints:
  /:
    url: https://content.da.live/sirugh/json2html-poc/
    type: markup

# DEPRECATION NOTICE: Folder Mapping is deprecated, but we
# provide this initial mapping so you can view products quickly.
# Your real options are:
#  - create a document per product at the path (/products/{urlKey}/{sku})
#  - set up an overlay, like aem-commerce-prerender
#
# See: https://www.aem.live/developer/folder-mapping
# See: https://github.com/adobe-rnd/aem-commerce-prerender
folders:
  /products/: /products/default
